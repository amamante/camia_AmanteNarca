<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TaskMaster</title>
<style>
body { font-family: "Century Gothic", Arial; background: #e0f7ff; margin:0; }
.center-container { display:flex; justify-content:center; align-items:center; flex-direction:column; min-height:100vh; }
.panel { background:white; padding:30px; border-radius:30px; box-shadow:0 10px 25px rgba(0,0,0,0.1); margin:20px; }
input, select { width:100%; padding:12px; margin:8px 0; border-radius:15px; border:1px solid #ccc; }
.main-btn { font-size:20px; padding:15px 40px; border-radius:25px; border:none; background:white; margin:10px; cursor:pointer; }
.page { display:none; }
.active { display:block; }
.task { padding:10px; margin:10px 0; border-radius:15px; }
.low { background:#cce0ff; }
.medium { background:#fff5b3; }
.urgent { background:#ffcccc; }
.completed { background:#ccffdd; }
.countdown { font-size:12px; margin-top:5px; }
button { cursor:pointer; }
#editSubjectsBtn { position: fixed; top: 10px; right: 10px; font-size:16px; padding:10px 15px; border-radius:20px; }
.subject-row { display:flex; justify-content:space-between; align-items:center; margin:5px 0; padding:5px 10px; border:1px solid #ccc; border-radius:10px; }
.subject-row input { width:70%; border-radius:10px; padding:5px; }

/* Calendar styles */
.calendar-container { width:75vw; max-width:1200px; margin:20px auto; background:white; border-radius:25px; padding:20px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
.calendar-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
.calendar-weekdays { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:5px; }
.calendar-weekdays div { text-align:center; font-weight:bold; }
.calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
.calendar-day { border:1px solid #ccc; border-radius:10px; padding:5px; min-height:80px; position:relative; cursor:pointer; }
.calendar-day .day-number { font-weight:bold; margin-bottom:5px; }
.task-bar { border-radius:5px; color:#000; font-size:11px; padding:2px 3px; margin:2px 0; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;}
</style>
</head>
<body>

<button id="editSubjectsBtn" onclick="showSubjectsPanel()">Edit Subjects</button>

<!-- SUBJECT PAGE -->
<div id="subjectPage" class="page active">
  <div class="center-container">
    <div class="panel">
      <h1 style="text-align:center; font-size:42px;">Welcome to TaskMaster!</h1>
      <p style="text-align:center; margin-bottom:20px;">Please enter all your subjects.</p>
      <input id="subjectInput" placeholder="Enter a subject">
      <button class="main-btn" onclick="addSubject()">Add Subject</button>
      <h3>Your Subjects:</h3>
      <div id="subjectList"></div>
      <button class="main-btn" onclick="finishSubjects()">Continue</button>
    </div>
  </div>
</div>

<!-- HOME PAGE -->
<div id="homePage" class="page">
  <div class="center-container">
    <h1 id="welcomeTitle">Welcome to TaskMaster!</h1>
    <button class="main-btn" onclick="showPage('addPage')">Add Task</button>
    <button class="main-btn" onclick="showPage('viewPage')">View Tasks</button>
    <button class="main-btn" onclick="showPage('calendarPage')">Task Calendar</button>
  </div>
</div>

<!-- ADD TASK PAGE -->
<div id="addPage" class="page">
  <div class="center-container">
    <div class="panel">
      <h2>Add Task</h2>
      <select id="subject"></select>
      <input id="type" placeholder="Task Type">
      <input id="date" placeholder="MM/DD/YYYY">
      <input id="time" placeholder="HH:MM AM/PM">
      <select id="priority">
        <option value="urgent">High Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="low">Low Priority</option>
      </select>
      <button class="main-btn" onclick="addTask()">Add Task</button>
      <button class="main-btn" onclick="showPage('homePage')">Back</button>
      <h3>Active Tasks</h3>
      <div id="taskListAdd"></div>
    </div>
  </div>
</div>

<!-- EDIT TASK PAGE -->
<div id="editPage" class="page">
  <div class="center-container">
    <div class="panel">
      <h2>Edit Task</h2>
      <select id="editSubject"></select>
      <input id="editType">
      <input id="editDate">
      <input id="editTime">
      <select id="editPriority">
        <option value="urgent">High Priority</option>
        <option value="medium">Medium Priority</option>
        <option value="low">Low Priority</option>
      </select>
      <button class="main-btn" onclick="saveEdit()">Save Changes</button>
      <button class="main-btn" onclick="showPage('viewPage')">Back</button>
    </div>
  </div>
</div>

<!-- VIEW TASK PAGE -->
<div id="viewPage" class="page">
  <div class="center-container">
    <div class="panel">
      <h2>Active Tasks</h2>
      <div id="activeTasks"></div>
      <h2>Completed Tasks</h2>
      <div id="completedTasks"></div>
      <button class="main-btn" onclick="showPage('homePage')">Back</button>
    </div>
  </div>
</div>

<!-- CALENDAR PAGE -->
<div id="calendarPage" class="page">
  <div class="center-container">
    <div class="calendar-container">
      <div class="calendar-header">
        <button onclick="prevMonth()">&lt;</button>
        <h2 id="calendarMonth"></h2>
        <button onclick="nextMonth()">&gt;</button>
      </div>
      <div class="calendar-weekdays" id="calendarWeekdays"></div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <button class="main-btn" onclick="showPage('homePage')">Back</button>
    </div>
  </div>
</div>

<!-- DAY VIEW PAGE -->
<div id="dayPage" class="page">
  <div class="center-container">
    <div class="panel">
      <h2 id="dayTitle"></h2>
      <h3>Active Tasks</h3>
      <div id="dayActiveTasks"></div>
      <h3>Completed Tasks</h3>
      <div id="dayCompletedTasks"></div>
      <button class="main-btn" onclick="showPage('calendarPage')">Back to Calendar</button>
    </div>
  </div>
</div>

<script>
let tasks = [];
let subjects = [];
let editIndex = null;

/* --- SUBJECTS --- */
function addSubject() {
    let input = document.getElementById('subjectInput');
    let val = input.value.trim();
    if (!val) return;

    // Prevent duplicates (case-insensitive)
    if (subjects.some(s => s.toLowerCase() === val.toLowerCase())) {
        alert("Subject already exists!");
        return;
    }

    subjects.push(val);
    input.value = '';
    renderSubjects();
}

function renderSubjects() {
    let div = document.getElementById('subjectList');
    div.innerHTML = '';
    subjects.forEach((s, i) => {
        let row = document.createElement('div');
        row.className = 'subject-row';
        let input = document.createElement('input');
        input.value = s;
        input.onchange = function () { subjects[i] = this.value; renderTasks(); };
        let del = document.createElement('button');
        del.textContent = 'Remove';
        del.onclick = () => {
            let oldName = subjects[i];
            subjects.splice(i, 1);
            tasks.forEach(t => { if (!t.completed && t.subject === oldName) t.subject = "(Unassigned)"; });
            renderSubjects();
            renderTasks();
        };
        row.appendChild(input);
        row.appendChild(del);
        div.appendChild(row);
    });
}

function finishSubjects() {
    if (subjects.length === 0) { alert("Add at least one subject"); return; }
    showPage('homePage');
}

function showSubjectsPanel() { showPage('subjectPage'); renderSubjects(); }

/* --- NAVIGATION --- */
function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById(p).classList.add('active');
    if (p === 'addPage') populateSubjects();
    renderTasks();
    if (p === 'calendarPage') renderCalendar();
    if (p === 'editPage') populateSubjectsEdit();
}

/* --- POPULATE SUBJECTS --- */
function populateSubjects() { 
    subject.innerHTML = ''; 
    subjects.forEach(s => { let o = document.createElement('option'); o.value = s; o.textContent = s; subject.appendChild(o); });
}
function populateSubjectsEdit() { 
    editSubject.innerHTML = ''; 
    subjects.forEach(s => { let o = document.createElement('option'); o.value = s; o.textContent = s; editSubject.appendChild(o); });
}

/* --- DATE/TIME AUTO --- */
date.oninput = function() {
    let v = this.value.replace(/\D/g,'');
    if(v.length>2)v=v.slice(0,2)+'/'+v.slice(2);
    if(v.length>5)v=v.slice(0,5)+'/'+v.slice(5);
    this.value=v.slice(0,10);
}
time.oninput = function() {
    let v=this.value.toUpperCase().replace(/[^0-9:APM ]/g,'');
    if(/^\d{3,4}/.test(v)) v=v.replace(/^(\d{2})(\d{1,2})/,'$1:$2');
    this.value=v;
}

/* --- PARSE DATE --- */
function parseDate(d,t){ 
    let [m,da,y]=d.split('/').map(Number); 
    let [time,mer]=t.split(' '); 
    let [h,min]=time.split(':').map(Number); 
    if(mer==="PM"&&h!==12)h+=12; 
    if(mer==="AM"&&h===12) h=0; 
    return new Date(y,m-1,da,h,min);
}

/* --- TASK FUNCTIONS --- */
function addTask(){
    if(!subject.value||!type.value||!date.value||!time.value) return alert("Fill all fields");
    let t={subject:subject.value,type:type.value,date:date.value,time:time.value,priority:priority.value,completed:false};
    t.due=parseDate(t.date,t.time); 
    tasks.push(t); 
    type.value=''; date.value=''; time.value=''; 
    renderTasks(); 
}
function openEdit(i){ 
    editIndex=i; 
    let t=tasks[i]; 
    editSubject.value=t.subject; editType.value=t.type; editDate.value=t.date; editTime.value=t.time; editPriority.value=t.priority; 
    showPage('editPage');
}
function saveEdit(){ 
    let t=tasks[editIndex]; 
    t.subject=editSubject.value; t.type=editType.value; t.date=editDate.value; t.time=editTime.value; t.priority=editPriority.value; 
    t.due=parseDate(t.date,t.time); 
    if(!t.completed) t.completedOn = t.completedOn || null; 
    showPage('viewPage'); renderTasks();
}

/* --- COMPLETE/UNDO --- */
function toggleComplete(i){ 
    let t = tasks[i]; 
    t.completed = !t.completed; 
    if(t.completed) t.completedOn = new Date(); 
    renderTasks();
}

/* --- COUNTDOWN --- */
function formatCountdown(ms){ 
    if(ms<0) ms=0; 
    let sec=Math.floor(ms/1000)%60; 
    let min=Math.floor(ms/60000)%60; 
    let hr=Math.floor(ms/3600000)%24; 
    let day=Math.floor(ms/86400000); 
    return `${day}d ${hr}h ${min}m ${sec}s`;
}

/* --- RENDER TASKS --- */
function renderTasks(){
  let activeDiv=document.getElementById('activeTasks'); 
  let completedDiv=document.getElementById('completedTasks'); 
  let taskListAddDiv=document.getElementById('taskListAdd');
  if(activeDiv) activeDiv.innerHTML=''; 
  if(completedDiv) completedDiv.innerHTML=''; 
  if(taskListAddDiv) taskListAddDiv.innerHTML='';
  tasks.forEach((t,i)=>{
    if(taskListAddDiv && !t.completed){ 
      let d=document.createElement('div'); 
      d.className='task '+t.priority; 
      d.innerHTML=`<b>${t.subject}</b><br>${t.type}<br>${t.due.toLocaleString()}<br><button onclick="toggleComplete(${i})">Complete</button><button onclick="openEdit(${i})">Edit</button>`; 
      taskListAddDiv.appendChild(d);
    }
    if(activeDiv && !t.completed){ 
      let d=document.createElement('div'); 
      d.className='task '+t.priority; 
      d.innerHTML=`<b>${t.subject}</b><br>Type: ${t.type}<br>Due: ${t.due.toLocaleString()}<br><div id="cd-${i}" class="countdown">${formatCountdown(t.due-new Date())}</div><button onclick="toggleComplete(${i})">Complete</button><button onclick="openEdit(${i})">Edit</button>`; 
      activeDiv.appendChild(d);
    }
    if(completedDiv && t.completed){ 
      let d=document.createElement('div'); 
      d.className='task completed'; 
      d.innerHTML=`Subject: ${t.subject}<br>Type: ${t.type}<br>Due: ${t.due.toLocaleString()}<br>Completed On: ${t.completedOn.toLocaleString()}<br><button onclick="toggleComplete(${i})">Undo Complete</button><button onclick="openEdit(${i})">Edit</button>`; 
      completedDiv.appendChild(d);
    }
  });
}

/* --- LIVE COUNTDOWN --- */
setInterval(()=>{ 
  tasks.forEach((t,i)=>{ 
    let cd=document.getElementById(`cd-${i}`); 
    if(cd) cd.textContent=formatCountdown(t.due-new Date()); 
    let cdDay=document.getElementById(`cd-day-${i}`); 
    if(cdDay) cdDay.textContent=formatCountdown(t.due-new Date()); 
  }); 
},1000);

/* --- CALENDAR --- */
let currentMonth=new Date();
function renderCalendar(){
  document.getElementById('calendarMonth').textContent=currentMonth.toLocaleString('default',{month:'long',year:'numeric'});
  const weekdays=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let wdDiv=document.getElementById('calendarWeekdays');
  wdDiv.innerHTML='';
  weekdays.forEach(d=>{ let div=document.createElement('div'); div.textContent=d; wdDiv.appendChild(div);});
  let grid=document.getElementById('calendarGrid');
  grid.innerHTML='';
  let firstDay=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),1);
  let lastDay=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+1,0);
  for(let i=0;i<firstDay.getDay();i++){ grid.appendChild(document.createElement('div'));}
  for(let d=1; d<=lastDay.getDate(); d++){
    let dayDiv=document.createElement('div'); 
    dayDiv.className='calendar-day';
    dayDiv.innerHTML=`<div class="day-number">${d}</div>`;
    let dayDate=new Date(currentMonth.getFullYear(),currentMonth.getMonth(),d);
    tasks.filter(t=>t.due.toDateString()===dayDate.toDateString() && !t.completed).forEach(t=>{
      let span=document.createElement('div');
      span.className='task-bar';
      span.textContent=`${t.subject}: ${t.type}`;
      if(t.priority==='urgent') span.style.backgroundColor='#ffcccc';
      else if(t.priority==='medium') span.style.backgroundColor='#fff5b3';
      else span.style.backgroundColor='#cce0ff';
      dayDiv.appendChild(span);
    });
    dayDiv.onclick=()=>showDay(dayDate);
    grid.appendChild(dayDiv);
  }
}
function prevMonth(){ currentMonth.setMonth(currentMonth.getMonth()-1); renderCalendar(); }
function nextMonth(){ currentMonth.setMonth(currentMonth.getMonth()+1); renderCalendar(); }

/* --- DAY VIEW --- */
function showDay(date){ 
  showPage('dayPage'); 
  document.getElementById('dayTitle').textContent='Tasks for '+date.toDateString(); 
  let activeDiv=document.getElementById('dayActiveTasks'); 
  let completedDiv=document.getElementById('dayCompletedTasks'); 
  activeDiv.innerHTML=''; completedDiv.innerHTML='';
  tasks.forEach((t,i)=>{ 
    if(t.due.toDateString()===date.toDateString() && !t.completed){ 
      let d=document.createElement('div'); 
      d.className='task '+t.priority; 
      d.innerHTML=`<b>${t.subject}</b><br>${t.type}<br>Due: ${t.due.toLocaleString()}<br><div id="cd-day-${i}" class="countdown">${formatCountdown(t.due-new Date())}</div><button onclick="toggleComplete(${i})">Complete</button><button onclick="openEdit(${i})">Edit</button>`; 
      activeDiv.appendChild(d);
    } 
    if(t.due.toDateString()===date.toDateString() && t.completed){ 
      let d=document.createElement('div'); 
      d.className='task completed'; 
      d.innerHTML=`Subject: ${t.subject}<br>Type: ${t.type}<br>Due: ${t.due.toLocaleString()}<br>Completed On: ${t.completedOn.toLocaleString()}<br><button onclick="toggleComplete(${i})">Undo Complete</button><button onclick="openEdit(${i})">Edit</button>`; 
      completedDiv.appendChild(d);
    } 
  });
}

/* --- ENTER KEY --- */
subjectInput.addEventListener('keydown',e=>{ if(e.key==='Enter') addSubject(); });
type.addEventListener('keydown',e=>{ if(e.key==='Enter') addTask(); });
</script>
</body>
</html>
